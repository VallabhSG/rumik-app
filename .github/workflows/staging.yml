name: Staging Deployment

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to deploy
        required: true
        default: all
        type: choice
        options: [all, android, ios, web]

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  # ── Android → Firebase App Distribution ──────────────────────────────────────
  # SKIPPED: EAS free tier exhausted (15/15 builds/month). Re-enable by removing
  # the 'if: false' condition below once quota resets or plan is upgraded.
  staging-android:
    name: Android Staging (Firebase)
    runs-on: ubuntu-latest
    if: false  # SKIPPED: EAS free tier quota exhausted this month
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --prefer-offline

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (staging)
        run: eas build --platform android --profile staging --non-interactive --wait
        env:
          EAS_BUILD_AUTOCOMMIT: 1

      - name: Download APK artifact
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json | jq -r '.[0].artifacts.buildUrl')
          curl -L "$BUILD_URL" -o rumik-staging.apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          file: rumik-staging.apk
          releaseNotes: |
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            ${{ github.event.head_commit.message }}

  # ── iOS → TestFlight ──────────────────────────────────────────────────────────
  # SKIPPED: No Apple Developer account ($99/year required).
  # To enable: add secrets EXPO_APPLE_ID, EXPO_APPLE_APP_SPECIFIC_PASSWORD,
  # ASC_APP_ID, APPLE_TEAM_ID and remove the 'if: false' condition below.
  staging-ios:
    name: iOS Staging (TestFlight)
    runs-on: macos-14
    if: false  # SKIPPED: No Apple Developer account
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --prefer-offline

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (staging) + submit to TestFlight
        run: eas build --platform ios --profile staging --non-interactive --wait --auto-submit
        env:
          EAS_BUILD_AUTOCOMMIT: 1
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}

  # ── Web → Preview URL ─────────────────────────────────────────────────────────
  staging-web:
    name: Web Preview
    runs-on: ubuntu-latest
    if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'web' || github.event_name == 'push'
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview-url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --prefer-offline

      - name: Export web
        run: npx expo export --platform web --output-dir dist
        env:
          EXPO_NO_DOTENV: 1
          NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL }}
          NEXT_PUBLIC_OTA_SERVER: ${{ secrets.STAGING_OTA_URL }}
          NEXT_PUBLIC_CONFIG_SERVER: ${{ secrets.STAGING_CONFIG_URL }}

      - name: Deploy to Vercel (staging)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: dist

      - name: Comment preview URL on PR / commit
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            if (context.issue && context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🌐 **Web Preview:** ${url}`
              });
            }

  # ── Automated QA checklist ────────────────────────────────────────────────────
  qa-checklist:
    name: Automated QA
    runs-on: ubuntu-latest
    needs: [staging-web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --prefer-offline

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run QA smoke tests against staging
        run: npx playwright test --project=chromium --grep @smoke
        env:
          BASE_URL: ${{ needs.staging-web.outputs.preview_url }}

      - name: Post QA summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const conclusion = '${{ job.status }}';
            const icon = conclusion === 'success' ? '✅' : '❌';
            const url = '${{ needs.staging-web.outputs.preview_url }}';
            const body = `${icon} **Staging QA:** ${conclusion}\n🔗 [Preview](${url})`;
            if (context.issue && context.issue.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
