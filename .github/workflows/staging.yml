name: Staging Deployment

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to deploy
        required: true
        default: all
        type: choice
        options: [all, android, ios, web]

concurrency:
  group: staging-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

defaults:
  run:
    shell: bash

jobs:
  # ── Android → Firebase App Distribution ──────────────────────────────────────
  # Required secrets: EXPO_TOKEN, FIREBASE_ANDROID_APP_ID, FIREBASE_SERVICE_ACCOUNT
  staging-android:
    name: Android Staging (Firebase)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'android'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK (staging)
        run: eas build --platform android --profile staging --non-interactive --wait
        env:
          EAS_BUILD_AUTOCOMMIT: 1

      - name: Download APK artifact
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json \
            | jq -r '.[0].artifacts.buildUrl')
          curl -L "$BUILD_URL" -o rumik-staging.apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: internal-testers
          file: rumik-staging.apk
          releaseNotes: |
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            ${{ github.event.head_commit.message }}

  # ── iOS → TestFlight ──────────────────────────────────────────────────────────
  # Disabled: Apple Developer account required ($99/year).
  # Required secrets: EXPO_TOKEN, EXPO_APPLE_ID, EXPO_APPLE_APP_SPECIFIC_PASSWORD
  staging-ios:
    name: iOS Staging (TestFlight)
    runs-on: macos-14
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/Library/pnpm/store
          key: pnpm-store-macos-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-macos-

      - name: Restore CocoaPods cache
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (staging) + submit to TestFlight
        run: eas build --platform ios --profile staging --non-interactive --wait --auto-submit
        env:
          EAS_BUILD_AUTOCOMMIT: 1
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}

  # ── Web → Vercel preview ──────────────────────────────────────────────────────
  # Required secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
  staging-web:
    name: Web Preview
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'web'
    outputs:
      preview_url: ${{ steps.deploy.outputs.preview_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Restore Expo / Metro cache
        uses: actions/cache@v4
        with:
          path: |
            .expo
            node_modules/.cache/metro
          key: expo-metro-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: expo-metro-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm install --frozen-lockfile

      - name: Export web
        run: npx expo export --platform web --output-dir dist
        env:
          EXPO_NO_DOTENV: 1
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_OTA_SERVER_URL: ${{ secrets.STAGING_OTA_URL }}

      - name: Deploy to Vercel (staging)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: dist

      - name: Comment preview URL
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview_url }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🌐 **Web Preview:** ${url}`
            });

  # ── Automated QA checklist ────────────────────────────────────────────────────
  qa-checklist:
    name: Automated QA
    runs-on: ubuntu-latest
    needs: staging-web
    if: needs.staging-web.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Restore Playwright browser cache
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright + system deps
        run: npx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system deps only (cache hit)
        run: npx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Run QA smoke tests against staging
        run: npx playwright test --project=chromium --grep @smoke
        env:
          BASE_URL: ${{ needs.staging-web.outputs.preview_url }}

      - name: Post QA summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const conclusion = '${{ job.status }}';
            const icon = conclusion === 'success' ? '✅' : '❌';
            const url = '${{ needs.staging-web.outputs.preview_url }}';
            const body = `${icon} **Staging QA:** ${conclusion}\n🔗 [Preview](${url})`;
            if (context.issue?.number) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body
              });
            }
