name: Production Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: Version to release (e.g. 1.2.3)
        required: true
      rollback_to:
        description: Version to rollback to (leave empty for normal release)
        required: false

permissions:
  contents: write
  issues: write

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

defaults:
  run:
    shell: bash

jobs:
  # ── Resolve version + rollback flag ──────────────────────────────────────────
  version:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      prev_version: ${{ steps.ver.outputs.prev_version }}
      is_rollback: ${{ steps.ver.outputs.is_rollback }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: ver
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_version=${PREV_TAG#v}" >> $GITHUB_OUTPUT

          if [ -n "${{ github.event.inputs.rollback_to }}" ]; then
            echo "version=${{ github.event.inputs.rollback_to }}" >> $GITHUB_OUTPUT
            echo "is_rollback=true" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "is_rollback=false" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "is_rollback=false" >> $GITHUB_OUTPUT
          fi

  # ── Changelog ─────────────────────────────────────────────────────────────────
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.is_rollback == 'false'
    outputs:
      changelog: ${{ steps.gen.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: gen
        name: Generate changelog from conventional commits
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          RANGE="${PREV_TAG:+${PREV_TAG}..HEAD}"
          RANGE="${RANGE:-HEAD}"

          CHANGELOG=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges \
            | grep -E "^- (feat|fix|perf|refactor|chore):" \
            || echo "- Internal improvements")

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update CHANGELOG.md
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)
          ENTRY="## [${VERSION}] - ${DATE}\n${{ steps.gen.outputs.changelog }}\n"

          if [ -f CHANGELOG.md ]; then
            printf '%s\n\n%s' "$ENTRY" "$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            printf '# Changelog\n\n%s' "$ENTRY" > CHANGELOG.md
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: changelog-${{ needs.version.outputs.version }}
          path: CHANGELOG.md
          retention-days: 30

  # ── Bump app.json (local only — not committed) ────────────────────────────────
  bump-version:
    name: Bump app.json
    runs-on: ubuntu-latest
    needs: version
    if: needs.version.outputs.is_rollback == 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Update version in app.json
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.version = '$VERSION';
            const [maj, min, pat] = '$VERSION'.split('.').map(Number);
            const build = maj * 10000 + min * 100 + pat;
            app.expo.ios = app.expo.ios || {};
            app.expo.android = app.expo.android || {};
            app.expo.ios.buildNumber = String(build);
            app.expo.android.versionCode = build;
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "

      - uses: actions/upload-artifact@v4
        with:
          name: app-json-${{ needs.version.outputs.version }}
          path: app.json
          retention-days: 30

  # ── OTA update (JS bundle) ────────────────────────────────────────────────────
  ota-update:
    name: OTA Update
    runs-on: ubuntu-latest
    needs: [version, bump-version]
    if: always() && needs.version.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update via EAS Update
        if: needs.version.outputs.is_rollback == 'false'
        run: |
          eas update \
            --branch production \
            --message "v${{ needs.version.outputs.version }}" \
            --non-interactive

      - name: Register release with custom OTA server
        continue-on-error: true
        run: |
          TAG="v${{ needs.version.outputs.version }}"
          NOTES=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null | head -20)
          [ -z "$NOTES" ] && NOTES=$(git log -1 --pretty=format:"%s" 2>/dev/null || echo "Release $TAG")
          NOTES_JSON=$(echo "$NOTES" | jq -Rs '.')

          curl --fail -X POST "${{ secrets.OTA_SERVER_URL }}/api/releases" \
            -H "Authorization: Bearer ${{ secrets.OTA_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"version\": \"${{ needs.version.outputs.version }}\",
              \"channel\": \"production\",
              \"rollout_percentage\": 5,
              \"is_rollback\": ${{ needs.version.outputs.is_rollback }},
              \"commit_sha\": \"${{ github.sha }}\",
              \"release_notes\": $NOTES_JSON
            }"

  # ── Web → Vercel production ───────────────────────────────────────────────────
  release-web:
    name: Web Production
    runs-on: ubuntu-latest
    needs: [version, bump-version]
    if: needs.version.outputs.is_rollback == 'false'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Restore Expo / Metro cache
        uses: actions/cache@v4
        with:
          path: |
            .expo
            node_modules/.cache/metro
          key: expo-metro-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: expo-metro-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm install --frozen-lockfile

      - name: Export web (production)
        run: npx expo export --platform web --output-dir dist
        env:
          EXPO_NO_DOTENV: 1
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_OTA_SERVER_URL: ${{ secrets.PROD_OTA_URL }}

      - name: Deploy to Vercel (production)
        continue-on-error: true
        run: pnpm dlx vercel deploy dist --prod --token "${{ secrets.VERCEL_TOKEN }}" --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ── Android → Firebase (production track) ────────────────────────────────────
  # Disabled: EAS free-tier build quota exhausted.
  # Required secrets: EXPO_TOKEN, FIREBASE_ANDROID_APP_ID, FIREBASE_SERVICE_ACCOUNT
  release-android:
    name: Android Production (Firebase)
    runs-on: ubuntu-latest
    needs: [version, bump-version]
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (production) + Firebase distribute
        run: eas build --platform android --profile production --non-interactive --wait
        env:
          EAS_BUILD_AUTOCOMMIT: 1

      - name: Download APK and upload to Firebase
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json \
            | jq -r '.[0].artifacts.buildUrl')
          curl -L "$BUILD_URL" -o rumik-production.apk

      - uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: production-testers
          file: rumik-production.apk
          releaseNotes: v${{ needs.version.outputs.version }}

  # ── iOS → TestFlight (production) ─────────────────────────────────────────────
  # Disabled: Apple Developer account required ($99/year).
  # Required secrets: EXPO_TOKEN, EXPO_APPLE_ID, EXPO_APPLE_APP_SPECIFIC_PASSWORD
  release-ios:
    name: iOS Production (TestFlight)
    runs-on: macos-14
    needs: [version, bump-version]
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/Library/pnpm/store
          key: pnpm-store-macos-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-macos-

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (production) + submit to TestFlight
        run: eas build --platform ios --profile production --non-interactive --wait --auto-submit
        env:
          EAS_BUILD_AUTOCOMMIT: 1
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}

  # ── GitHub Release ────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [version, changelog, ota-update]
    if: always() && needs.version.outputs.is_rollback == 'false' && needs.version.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - name: Download changelog artifact
        uses: actions/download-artifact@v4
        with:
          name: changelog-${{ needs.version.outputs.version }}

      - name: Create GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8')
              .split('\n').slice(0, 30).join('\n');
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'v${{ needs.version.outputs.version }}',
              name: 'v${{ needs.version.outputs.version }}',
              body: changelog,
              draft: false,
              prerelease: false
            });

  # ── Crash rate monitor + auto-rollback ───────────────────────────────────────
  rollback-monitor:
    name: Rollback Monitor
    runs-on: ubuntu-latest
    needs: [version, ota-update]
    if: needs.ota-update.result == 'success' && needs.version.outputs.is_rollback == 'false'
    steps:
      - name: Poll crash rate (20 min window)
        run: |
          MAX_ATTEMPTS=10
          SLEEP_SECONDS=120
          THRESHOLD=0.05

          echo "Monitoring crash rate — ${MAX_ATTEMPTS} checks × ${SLEEP_SECONDS}s = 20 min"
          echo "Rollback threshold: ${THRESHOLD} (${THRESHOLD}%)"

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "--- Check ${attempt}/${MAX_ATTEMPTS} ---"
            sleep $SLEEP_SECONDS

            RESPONSE=$(curl -sf \
              "${{ secrets.OTA_SERVER_URL }}/api/crash-rate/current?channel=production" \
              -H "Authorization: Bearer ${{ secrets.OTA_API_KEY }}" \
              || echo '{"success":false}')

            SUCCESS=$(echo "$RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(str(d.get('success',False)).lower())" \
              2>/dev/null || echo "false")

            if [ "$SUCCESS" != "true" ]; then
              echo "OTA server unreachable — skipping check ${attempt}"
              continue
            fi

            CRASH_RATE=$(echo "$RESPONSE" | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('crash_rate',0))" \
              2>/dev/null || echo "0")

            echo "Crash rate: ${CRASH_RATE} (threshold: ${THRESHOLD})"

            EXCEEDED=$(python3 -c \
              "import sys; sys.exit(0 if float('${CRASH_RATE}') > float('${THRESHOLD}') else 1)" \
              2>/dev/null && echo "yes" || echo "no")

            if [ "$EXCEEDED" = "yes" ]; then
              echo "::error::Crash rate ${CRASH_RATE} exceeds ${THRESHOLD} — triggering rollback"

              # Pause the current rollout
              curl -sf -X POST \
                "${{ secrets.OTA_SERVER_URL }}/api/releases/current/pause" \
                -H "Authorization: Bearer ${{ secrets.OTA_API_KEY }}" \
                -H "Content-Type: application/json" \
                -d "{\"reason\":\"Auto-rollback: crash rate ${CRASH_RATE} exceeded ${THRESHOLD}\"}" || true

              # Dispatch rollback workflow
              curl -X POST \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rollback.yml/dispatches" \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "{\"ref\":\"master\",\"inputs\":{
                  \"version\":\"${{ needs.version.outputs.prev_version }}\",
                  \"reason\":\"Auto-rollback: crash rate ${CRASH_RATE} exceeded ${THRESHOLD}\",
                  \"channels\":\"production\"
                }}" || true

              exit 1
            fi

            echo "Check ${attempt}: OK (${CRASH_RATE} <= ${THRESHOLD})"
          done

          echo "✓ Monitoring complete — crash rate within threshold for full 20-minute window"
