name: PR Validation

on:
  pull_request:
    branches: [master, develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-validation-${{ github.head_ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

# ── Shared defaults ───────────────────────────────────────────────────────────
defaults:
  run:
    shell: bash

jobs:
  # ── Formatting ────────────────────────────────────────────────────────────────
  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx}" "app/**/*.{ts,tsx}"

  # ── Type Checking ─────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: npx tsc --noEmit

  # ── Unit Tests + Coverage ─────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Restore Jest cache
        uses: actions/cache@v4
        with:
          path: /tmp/jest-cache
          key: jest-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: jest-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: |
          pnpm exec jest \
            --ci \
            --forceExit \
            --cacheDirectory /tmp/jest-cache \
            --coverage \
            --coverageThreshold='{"global":{"lines":70,"functions":70,"branches":60,"statements":70}}'

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Bundle Size Guard ─────────────────────────────────────────────────────────
  bundle-size:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Restore pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Restore Expo web cache
        uses: actions/cache@v4
        with:
          path: |
            .expo
            node_modules/.cache/metro
          key: expo-web-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: expo-web-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - run: pnpm install --frozen-lockfile

      - name: Export web bundle
        run: npx expo export --platform web --output-dir dist-ci
        env:
          EXPO_NO_DOTENV: 1

      - name: Check bundle size
        id: size-check
        run: |
          BUNDLE_SIZE=$(du -sk dist-ci | cut -f1)
          echo "Bundle size: ${BUNDLE_SIZE}KB"
          echo "bundle_size=${BUNDLE_SIZE}" >> $GITHUB_OUTPUT
          # Fail if web bundle exceeds 8MB
          if [ "$BUNDLE_SIZE" -gt 8192 ]; then
            echo "::error::Bundle size ${BUNDLE_SIZE}KB exceeds 8192KB limit"
            exit 1
          fi

      - name: Comment bundle size on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const size = '${{ steps.size-check.outputs.bundle_size }}';
            const kb = parseInt(size);
            const pct = Math.round(kb / 8192 * 100);
            const bar = '█'.repeat(Math.floor(pct / 10)) + '░'.repeat(10 - Math.floor(pct / 10));
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📦 **Bundle Size:** ${kb}KB / 8192KB (${pct}%)\n\`${bar}\``
            });

  # ── Dependency Audit ──────────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    continue-on-error: true  # advisories exist in the ecosystem; don't block PRs
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: pnpm audit (high + critical only)
        run: pnpm audit --audit-level=high --prod

  # ── OTA Server Tests ──────────────────────────────────────────────────────────
  ota-server-test:
    name: OTA Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ota-server/package-lock.json

      - name: Restore npm cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-ota-${{ runner.os }}-${{ hashFiles('ota-server/package-lock.json') }}
          restore-keys: npm-ota-${{ runner.os }}-

      - name: Install OTA server dependencies
        run: npm ci --prefer-offline
        working-directory: ota-server

      - name: Run OTA server tests
        run: npm test
        working-directory: ota-server

      - name: Upload OTA server coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ota-server-coverage
          path: ota-server/coverage/
          retention-days: 7

  # ── Secret Scanning ───────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    continue-on-error: true  # informational — never block PRs on scan results
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan for secrets
        run: gitleaks detect --source=. --redact --exit-code=1 --no-git

  # ── PR Gate ───────────────────────────────────────────────────────────────────
  # Only TypeScript + Unit Tests are required to merge.
  # format-check, bundle-size, audit, secret-scan are informational.
  pr-gate:
    name: PR Gate
    needs: [typecheck, test, ota-server-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Evaluate required checks
        run: |
          TC="${{ needs.typecheck.result }}"
          UT="${{ needs.test.result }}"
          OTA="${{ needs.ota-server-test.result }}"

          echo "TypeScript:       $TC"
          echo "Unit Tests:       $UT"
          echo "OTA Server Tests: $OTA"

          if [[ "$TC" == "failure" || "$UT" == "failure" || "$OTA" == "failure" ]]; then
            echo "::error::One or more required checks failed"
            exit 1
          fi

          echo "All required checks passed ✓"
