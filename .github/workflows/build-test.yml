name: Build & Test

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  # ── Web export (PRs + pushes) ─────────────────────────────────────────────────
  build-web:
    name: Build (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Export web
        run: npx expo export --platform web --output-dir dist
        env:
          EXPO_NO_DOTENV: 1

      - name: Upload web dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ── EAS builds (pushes to master/develop only — skips PRs) ───────────────────
  build-native:
    name: Build (${{ matrix.platform }})
    if: false  # SKIPPED: EAS free tier build quota exhausted — re-enable when quota resets or plan upgrades
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            runner: ubuntu-latest
            eas_profile: preview
          - platform: ios
            runner: macos-14
            eas_profile: preview
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # iOS skipped: no Apple Developer account
      - name: EAS Build (${{ matrix.platform }})
        if: matrix.platform == 'android'
        run: eas build --platform ${{ matrix.platform }} --profile ${{ matrix.eas_profile }} --non-interactive --wait
        env:
          EAS_BUILD_AUTOCOMMIT: 1

  # ── Unit tests ────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm exec jest --coverage --ci --forceExit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ── E2E tests (web) ───────────────────────────────────────────────────────────
  # Uses Vercel preview URL — avoids React Native Web blank-page issue in
  # headless Chromium when serving the bundle locally.
  e2e-web:
    name: E2E Tests (Web)
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright
        run: npx playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Install Playwright system deps only (cache hit)
        run: npx playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'

      - name: Get Vercel preview URL
        id: vercel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Vercel creates GitHub Deployments with environment_url in statuses.
          # Poll until we find one for this commit (max 3 min).
          for i in $(seq 1 18); do
            DEP_ID=$(gh api "/repos/${{ github.repository }}/deployments?sha=${{ github.sha }}&per_page=20"               --jq '[.[] | select(.environment | ascii_downcase | test("preview"))] | .[0].id // ""' 2>/dev/null || echo "")
            if [ -n "$DEP_ID" ] && [ "$DEP_ID" != "null" ]; then
              ENV_URL=$(gh api "/repos/${{ github.repository }}/deployments/$DEP_ID/statuses?per_page=1"                 --jq '.[0].environment_url // ""' 2>/dev/null || echo "")
              if [ -n "$ENV_URL" ] && [ "$ENV_URL" != "null" ]; then
                echo "url=$ENV_URL" >> $GITHUB_OUTPUT
                echo "Vercel preview: $ENV_URL"
                break
              fi
            fi
            echo "Waiting for Vercel deployment ($i/18)..."
            sleep 10
          done
          if [ -z "$ENV_URL" ] || [ "$ENV_URL" = "null" ]; then
            echo "::error::Could not find Vercel preview URL after 3 minutes"
            exit 1
          fi
      - name: Run E2E tests against Vercel preview
        run: npx playwright test --project=chromium
        env:
          BASE_URL: ${{ steps.vercel.outputs.url }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/
          retention-days: 7

  # ── Performance snapshot ──────────────────────────────────────────────────────
  perf-snapshot:
    name: Performance Snapshot
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Get Vercel preview URL
        id: vercel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Vercel creates GitHub Deployments with environment_url in statuses.
          # Poll until we find one for this commit (max 3 min).
          for i in $(seq 1 18); do
            DEP_ID=$(gh api "/repos/${{ github.repository }}/deployments?sha=${{ github.sha }}&per_page=20"               --jq '[.[] | select(.environment | ascii_downcase | test("preview"))] | .[0].id // ""' 2>/dev/null || echo "")
            if [ -n "$DEP_ID" ] && [ "$DEP_ID" != "null" ]; then
              ENV_URL=$(gh api "/repos/${{ github.repository }}/deployments/$DEP_ID/statuses?per_page=1"                 --jq '.[0].environment_url // ""' 2>/dev/null || echo "")
              if [ -n "$ENV_URL" ] && [ "$ENV_URL" != "null" ]; then
                echo "url=$ENV_URL" >> $GITHUB_OUTPUT
                echo "Vercel preview: $ENV_URL"
                break
              fi
            fi
            echo "Waiting for Vercel deployment ($i/18)..."
            sleep 10
          done
          if [ -z "$ENV_URL" ] || [ "$ENV_URL" = "null" ]; then
            echo "::error::Could not find Vercel preview URL after 3 minutes"
            exit 1
          fi
      - name: Run Lighthouse CI against Vercel preview
        run: pnpm dlx @lhci/cli autorun --collect.url=${{ steps.vercel.outputs.url }}
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-${{ github.sha }}
          path: .lighthouseci/
          retention-days: 14
