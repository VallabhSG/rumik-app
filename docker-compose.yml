services:
  ota-server:
    build:
      context: ./ota-server
      dockerfile: Dockerfile
    container_name: rumik-ota-server
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      DATA_DIR: /data
      NODE_ENV: production
      OTA_API_KEY: ${OTA_API_KEY:-changeme}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      REDIS_URL: ${REDIS_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
    volumes:
      - ota-data:/data
    depends_on:
      - prometheus
      - loki
    networks:
      - rumik-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: rumik-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - rumik-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: rumik-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-rumik}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - rumik-net
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.6
    container_name: rumik-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - rumik-net
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.6
    container_name: rumik-promtail
    volumes:
      - ./observability/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - rumik-net
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.4.1
    container_name: rumik-tempo
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    command: -config.file=/etc/tempo.yaml
    networks:
      - rumik-net
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: rumik-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - rumik-net
    restart: unless-stopped

  pg-backup:
    build:
      context: ./scripts
      dockerfile: backup-pg.Dockerfile
    container_name: rumik-pg-backup
    profiles:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKUP_DIR: /data/backups/pg
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ota-data:/data
    networks:
      - rumik-net
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: rumik-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - rumik-net
    restart: unless-stopped

volumes:
  ota-data:
  prometheus-data:
  grafana-data:
  loki-data:
  tempo-data:
  redis-data:
  alertmanager-data:

networks:
  rumik-net:
    driver: bridge
