global:
  resolve_timeout: 5m
  slack_api_url: ${SLACK_WEBHOOK_URL:-https://hooks.slack.com/services/placeholder}

route:
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: slack-default

receivers:
  - name: slack-default
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

inhibit_rules: []
